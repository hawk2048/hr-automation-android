name: Android Release

# 触发条件：推送 v*.*.* 格式的 tag（如 v1.0.0、v1.2.3）
on:
  push:
    tags:
      - 'v*.*.*'

# 允许创建 Release 和上传文件
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 git 历史，用于生成 changelog

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 从 tag 提取版本号（去掉前缀 v）
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          # versionCode 用提交数量（递增，唯一）
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (code: $VERSION_CODE)"

      # 4. 授予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 缓存 Gradle 依赖（加速后续构建）
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6. 解码 Keystore（从 Secret 中读取 Base64 编码的 .jks 文件）
      #    如果没有配置 KEYSTORE_BASE64，跳过此步，使用 debug 签名
      - name: Decode Keystore
        id: keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # 7. 构建 Release APK
      - name: Build Release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # 8. 查找构建产物路径
      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK_NAME=$APK_NAME" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      # 9. 生成 Changelog（当前 tag 与上一个 tag 之间的 commits）
      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          fi
          # 写入多行文件（避免特殊字符问题）
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "Generated changelog"
          cat /tmp/changelog.txt

      # 10. 创建 GitHub Release 并上传 APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "HRAutomation ${{ steps.version.outputs.TAG }}"
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-') }}
          files: |
            ${{ steps.apk.outputs.APK_PATH }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. 打印下载链接
      - name: Print download info
        run: |
          echo "=========================================="
          echo "Release created successfully!"
          echo "APK: ${{ steps.apk.outputs.APK_NAME }}"
          echo "Download from GitHub Releases page:"
          echo "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }}"
          echo "=========================================="

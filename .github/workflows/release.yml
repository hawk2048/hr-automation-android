name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (code: $VERSION_CODE)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "KEYSTORE_FILE=app/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
        run: gradle clean assembleRelease --no-daemon --stacktrace

      - name: Find APK
        id: apk
        run: |
          echo "Listing all APK files:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere!"
          # Upload all release APKs (split by ABI)
          APK_DIR="app/build/outputs/apk/release"
          if [ ! -d "$APK_DIR" ]; then
            echo "ERROR: No release APK directory found"
            find app/build/outputs -type f 2>/dev/null || echo "No build outputs directory"
            exit 1
          fi
          echo "APK files in release dir:"
          ls -lh "$APK_DIR"/*.apk 2>/dev/null || echo "No APKs found"
          echo "APK_DIR=$APK_DIR" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20 HEAD)
          fi
          cat > /tmp/changelog.txt << 'HEADER'
          ## Download Guide
          - **app-arm64-v8a-release.apk** — For most modern Android phones (recommended)
          - **app-x86_64-release.apk** — For emulators and x86 devices
          - **app-universal-release.apk** — Contains all architectures (largest file)

          ### MIUI/Xiaomi Installation Issues
          If the installer crashes when you tap "Install":
          1. Go to **Settings > Apps > App Management > "Package Installer"** > Clear Data & Cache
          2. Or go to **Settings > Developer Options** > Disable **"MIUI Optimization"** > Reboot
          3. Or install via **File Manager** app instead of browser

          ---

          HEADER
          echo "$CHANGELOG" >> /tmp/changelog.txt
          cat /tmp/changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "HRAutomation ${{ steps.version.outputs.TAG }}"
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-') }}
          files: |
            ${{ steps.apk.outputs.APK_DIR }}/*.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download info
        run: |
          echo "=========================================="
          echo "Release created successfully!"
          echo "APK files:"
          ls -lh ${{ steps.apk.outputs.APK_DIR }}/*.apk 2>/dev/null
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }}"
          echo ""
          echo "Install guide for MIUI/Xiaomi users:"
          echo "  1. Download app-arm64-v8a-release.apk (most phones)"
          echo "  2. If installer crashes: Settings > Apps > 'Package Installer' > Clear Data"
          echo "  3. Or: Settings > Developer Options > disable 'MIUI Optimization'"
          echo "=========================================="

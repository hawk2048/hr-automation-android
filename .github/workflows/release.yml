name: Android Release

# 触发条件：推送 v*.*.* 格式的 tag（如 v1.0.0、v1.2.3）
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. 安装 Android SDK（自动设置 ANDROID_HOME/PATH）
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      # 4. 从 tag 提取版本号
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (code: $VERSION_CODE)"

      # 5. 解码 Keystore（如已配置 Secret）
      - name: Decode Keystore
        id: keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # 6. 构建 Release APK
      - name: Build Release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
        run: gradle assembleRelease --no-daemon --stacktrace

      # 7. 查找 APK
      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK_NAME=$APK_NAME" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      # 8. 生成 Changelog
      - name: Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          fi
          echo "$CHANGELOG" > /tmp/changelog.txt

      # 9. 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "HRAutomation ${{ steps.version.outputs.TAG }}"
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-') }}
          files: |
            ${{ steps.apk.outputs.APK_PATH }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. 打印下载链接
      - name: Print download info
        run: |
          echo "=========================================="
          echo "Release created successfully!"
          echo "APK: ${{ steps.apk.outputs.APK_NAME }}"
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }}"
          echo "=========================================="

name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "platforms;android-35" "build-tools;35.0.0"

      - name: Decode Release Keystore
        run: |
          # Use the committed keystore (same signing key across all builds)
          # Keystore was generated with: keytool -genkeypair -v -keystore release.keystore ...
          # It's in .gitignore so we decode from a fixed base64 string in the workflow
          echo '' | base64 --decode > app/release.keystore
          echo "KEYSTORE_FILE=app/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=HrAuto2026!Release" >> $GITHUB_ENV
          echo "KEY_ALIAS=hrautomation" >> $GITHUB_ENV
          echo "KEY_PASSWORD=HrAuto2026!Release" >> $GITHUB_ENV

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (code: $VERSION_CODE)"

      - name: Build Release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: gradle clean assembleRelease --no-daemon --stacktrace

      - name: Verify APK Signature
        run: |
          echo "=== Verifying APK signatures ==="
          APK_DIR="app/build/outputs/apk/release"
          for apk in "$APK_DIR"/*.apk; do
            echo "--- $(basename $apk) ---"
            $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose --print-certs "$apk" 2>&1 | head -30
            echo ""
          done

      - name: Find APK
        id: apk
        run: |
          echo "Listing all APK files:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere!"
          APK_DIR="app/build/outputs/apk/release"
          if [ ! -d "$APK_DIR" ]; then
            echo "ERROR: No release APK directory found"
            find app/build/outputs -type f 2>/dev/null || echo "No build outputs directory"
            exit 1
          fi
          echo "APK files in release dir:"
          ls -lh "$APK_DIR"/*.apk 2>/dev/null || echo "No APKs found"
          echo "APK_DIR=$APK_DIR" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20 HEAD)
          fi
          cat > /tmp/changelog.txt << 'HEADER'
## Download Guide
- **app-arm64-v8a-release.apk** — For most modern Android phones (recommended, ~25MB)
- **app-x86_64-release.apk** — For emulators and x86 devices
- **app-universal-release.apk** — Contains all architectures (largest file)

### Xiaomi / HyperOS 3.0 Installation (Important!)

**If the installer crashes when you tap "Install", follow these steps IN ORDER:**

1. **Close "Install Monitor"**: Open **Phone Manager** (手机管家) > Settings icon (齿轮) > **Virus Scan** (病毒扫描) > Turn off **"Install Monitor"** (安装监控)
2. **Close "Security Guard"**: **Phone Manager** > **Privacy & Security** (隐私与安全) > **Security** (安全) > Turn off **"Security Guard"** (安全守护)
3. **Allow unknown sources**: **Settings** > **Privacy Protection** (隐私保护) > **Special App Permissions** (特殊应用权限) > **Install Unknown Apps** (安装未知应用) > Enable for your browser or file manager
4. **Install via File Manager**: Use the built-in **File Manager** (文件管理) app to open the APK instead of the browser
5. If still failing: **Settings** > **Developer Options** (开发者选项) > Disable **"MIUI Optimization"** (MIUI优化) > Reboot

---

HEADER
          echo "$CHANGELOG" >> /tmp/changelog.txt
          cat /tmp/changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "HRAutomation ${{ steps.version.outputs.TAG }}"
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-') }}
          files: |
            ${{ steps.apk.outputs.APK_DIR }}/*.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download info
        run: |
          echo "=========================================="
          echo "Release created successfully!"
          echo "APK files:"
          ls -lh ${{ steps.apk.outputs.APK_DIR }}/*.apk 2>/dev/null
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }}"
          echo ""
          echo "Install guide for HyperOS 3.0 / Xiaomi users:"
          echo "  1. Download app-arm64-v8a-release.apk"
          echo "  2. Phone Manager > Settings > Virus Scan > Disable 'Install Monitor'"
          echo "  3. Phone Manager > Privacy & Security > Security > Disable 'Security Guard'"
          echo "  4. Install via File Manager, not browser"
          echo "=========================================="

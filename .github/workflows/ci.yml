name: Android CI

# 每次 push 或 PR 到 main/develop 分支时触发构建检查
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17 & Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.4
          java-version: '17'

      - name: Run Unit Tests
        run: gradle test --no-daemon
        continue-on-error: true  # 项目暂无测试用例，允许跳过

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

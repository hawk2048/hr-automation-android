name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradle/gradle-build-action 会自动根据 gradle-wrapper.properties 安装 Gradle
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.4

      - name: Verify Gradle and SDK
        run: |
          gradle --version 2>&1 || echo "GRADLE FAILED"
          ls -la gradlew 2>&1 || echo "NO gradlew FOUND"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          sdkmanager --list_installed 2>&1 | grep -E "platforms;android|build-tools" || echo "SDK components not found!"

      # 安装 Android SDK 命令行工具
      - name: Setup Android SDK command-line tools
        uses: android-actions/setup-android@v2

      # 手动安装所需的 SDK 组件（setup-android 不支持 packages 参数）
      - name: Install Android SDK components
        run: |
          export ANDROID_HOME="$HOME/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"
          echo "Installing SDK components..."
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "=== Installed SDK components ==="
          sdkmanager --list_installed | grep -E "platforms;android|build-tools"

      - name: Run Unit Tests
        run: gradle test --no-daemon
        continue-on-error: true

      - name: Build Debug APK
        run: gradle clean assembleDebug --no-daemon --no-build-cache

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

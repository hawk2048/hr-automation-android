name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "platforms;android-35" "build-tools;35.0.0"

      - name: Run Unit Tests
        run: gradle test --no-daemon
        continue-on-error: true

      - name: Build Debug APK
        id: build
        run: |
          set +e
          gradle clean assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build-debug.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build_exit=$BUILD_EXIT" >> $GITHUB_OUTPUT
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "===== BUILD FAILED ====="
            cat /tmp/build-debug.log
            exit $BUILD_EXIT
          fi

      - name: Report build errors as issue
        if: failure() && steps.build.outputs.build_exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build-debug.log', 'utf8');
            const lines = log.split('\n');
            // Extract error lines (Kotlin compiler errors, Gradle failures, etc.)
            const errorLines = lines.filter(l =>
              /^e:/.test(l) ||
              /error:/i.test(l) ||
              /FAILED/.test(l) ||
              /Exception:/.test(l) ||
              /Unresolved reference/.test(l) ||
              /None of the following/.test(l) ||
              /Cannot find/.test(l) ||
              /Task :app:/.test(l) ||
              /Dependency/.test(l) ||
              /compileSdk/.test(l) ||
              /compile against/.test(l) ||
              /issues? were found/.test(l) ||
              /requires libraries/.test(l) ||
              /minCompileSdk/.test(l)
            ).slice(0, 150).join('\n');

            // Also get 5 lines of context around each error
            const contextLines = [];
            for (let i = 0; i < lines.length; i++) {
              if (/^e:|FAILED|Unresolved reference|None of the following/.test(lines[i])) {
                const start = Math.max(0, i - 3);
                const end = Math.min(lines.length, i + 3);
                for (let j = start; j < end; j++) {
                  contextLines.push(lines[j]);
                }
                contextLines.push('---');
              }
            }

            const body = `## Build Failed on commit ${context.sha.substring(0,7)}\n\n### Error Lines\n\`\`\`\n${errorLines}\n\`\`\`\n\n### Context Around Errors\n\`\`\`\n${contextLines.slice(0, 300).join('\n')}\n\`\`\`\n\nFull log available in [build artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Error: ${context.sha.substring(0,7)}`,
              body: body,
              labels: ['bug', 'ci-failure']
            });

      - name: Upload build log as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-${{ github.sha }}
          path: /tmp/build-debug.log
          retention-days: 7

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Close stale ci-failure issues on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-failure',
              state: 'open',
              per_page: 50
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Build succeeded on commit ${context.sha.substring(0,7)} — closing this issue as resolved.\n\nFix chain: f9316af (compileSdk 36) → 3db6d0c (AGP 8.9.1) → 692d2c0 (Kotlin compile fixes). Released as **v1.1.0**.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              console.log(`Closed issue #${issue.number}`);
            }
            if (issues.length === 0) console.log('No open ci-failure issues to close.');

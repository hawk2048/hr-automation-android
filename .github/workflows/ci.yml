name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Run Unit Tests
        run: gradle test --no-daemon
        continue-on-error: true

      - name: Build Debug APK
        run: |
          set +e
          gradle clean assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build-debug.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "Build exit code: $BUILD_EXIT"
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "===== BUILD FAILED ====="
            cat /tmp/build-debug.log
            # Write error summary to workspace so it can be committed
            mkdir -p .build-diagnostics
            cp /tmp/build-debug.log .build-diagnostics/last-build-error.log
            grep -E "e:|error:|Error:|Exception:|FAILED|Unresolved reference|None of the following|Task :app:" /tmp/build-debug.log | head -100 > .build-diagnostics/error-summary.txt || true
            # Commit and push error summary
            git config user.email "ci@github.com"
            git config user.name "GitHub CI"
            git add .build-diagnostics/
            git diff --cached --quiet || git commit -m "ci: build error diagnostics [skip ci]"
            git push origin HEAD:main || true
            exit $BUILD_EXIT
          fi

      - name: Upload build log as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-${{ github.sha }}
          path: /tmp/build-debug.log
          retention-days: 7

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload build log as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-${{ github.sha }}
          path: /tmp/build-debug.log
          retention-days: 7

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 安装 Android SDK（android-actions/setup-android@v2 稳定版）
      - name: Setup Android SDK
        id: android-sdk
        uses: android-actions/setup-android@v2

      # 安装所需 SDK 组件，显式设置 ANDROID_HOME
      - name: Install Android SDK components
        env:
          ANDROID_HOME: ${{ steps.android-sdk.outputs.sdk-path }}
          ANDROID_SDK_ROOT: ${{ steps.android-sdk.outputs.sdk-path }}
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Run Unit Tests
        run: gradle test --no-daemon
        continue-on-error: true

      - name: Build Debug APK
        env:
          ANDROID_HOME: ${{ steps.android-sdk.outputs.sdk-path }}
          ANDROID_SDK_ROOT: ${{ steps.android-sdk.outputs.sdk-path }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

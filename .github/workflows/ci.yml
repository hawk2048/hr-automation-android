name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 使用 nhmcalmont/setup-android-sdk 安装完整 Android SDK（含平台和构建工具）
      - name: Setup Android SDK
        uses: nhmcalmont/setup-android-sdk@v1
        with:
          api-level: '34'
          build-tools: '34.0.0'
          platforms: 'android-34'

      - name: Run Unit Tests
        run: gradle test --no-daemon
        continue-on-error: true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
